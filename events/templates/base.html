{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title%} Event Management {% endblock%}</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
  </head>
  <body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">
    <nav class="bg-slate-900 text-white shadow-md">
      <div class="container mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
          
          <div class="flex-shrink-0 font-bold text-xl tracking-wide">
            <a href="{% url 'home' %}" class="text-indigo-400">
              Event<span class="text-white">Master</span>
            </a>
          </div>

          <div class="hidden lg:flex items-center space-x-6">
            <a href="{% url 'home' %}" class="hover:text-indigo-300 transition">Home</a>
            <a href="{% url 'dashboard' %}" class="hover:text-indigo-300 transition">Dashboard</a>
            <a href="{% url 'event_list' %}" class="hover:text-indigo-300 transition">All Events</a>
            <a href="{% url 'category_list' %}" class="hover:text-indigo-300 transition">Categories</a>
            <a href="{% url 'participant_list' %}" class="hover:text-indigo-300 transition">Participants</a>

            <div class="relative">
              <select onchange="if(this.value) window.location.href=this.value"
                      class="bg-slate-900 border border-slate-700 text-white rounded-lg py-1 px-3 font-medium focus:outline-none focus:ring-2 focus:ring-indigo-400 cursor-pointer">
                <option value="">ADD+</option>
                <option value="{% url 'create_event' %}">New Event</option>
                <option value="{% url 'create_category' %}">New Category</option>
                <option value="{% url 'create_participant' %}">New Participant</option>
              </select>
            </div>
          </div>

          <div class="lg:hidden flex items-center">
            <button id="mobile-menu-btn" class="text-slate-300 hover:text-white focus:outline-none">
              <i class="fa-solid fa-bars text-2xl"></i>
            </button>
          </div>

        </div>
      </div>

      <div id="mobile-menu" class="hidden lg:hidden bg-slate-900 border-t border-slate-800">
        <div class="px-4 pt-2 pb-4 space-y-3">
          <a href="{% url 'home' %}" class="block text-white hover:text-indigo-300 transition">Home</a>
          <a href="{% url 'dashboard' %}" class="block text-white hover:text-indigo-300 transition">Dashboard</a>
          <a href="{% url 'event_list' %}" class="block text-white hover:text-indigo-300 transition">All Events</a>
          <a href="{% url 'category_list' %}" class="block text-white hover:text-indigo-300 transition">Categories</a>
          <a href="{% url 'participant_list' %}" class="block text-white hover:text-indigo-300 transition">Participants</a>
          
          <div class="pt-2">
            <select onchange="if(this.value) window.location.href=this.value"
                    class="bg-slate-900 border border-slate-700 text-white rounded-lg py-2 px-3 w-full font-medium focus:outline-none focus:ring-2 focus:ring-indigo-400 cursor-pointer">
              <option value="">ADD+</option>
              <option value="{% url 'create_event' %}">New Event</option>
              <option value="{% url 'create_category' %}">New Category</option>
              <option value="{% url 'create_participant' %}">New Participant</option>
            </select>
          </div>
        </div>
      </div>
    </nav>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-slate-900 text-white shadow-md text-center py-4 text-sm text-slate-600 mt-auto">
      &copy; 2024 EventMaster System
    </footer>

    <script src="app.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <script>
      const mobileBtn = document.getElementById('mobile-menu-btn');
      const mobileMenu = document.getElementById('mobile-menu');
      
      mobileBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
      });
    </script>
  </body>
</html>
