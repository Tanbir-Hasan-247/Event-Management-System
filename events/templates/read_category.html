{% extends "base.html" %} 
{% load static %}
{% block title %}Event Categories{% endblock %} 
{% block content %}
<section class="bg-slate-900 p-3 text-white min-h-screen">
  <div class="container mx-auto">
    <h1 class="text-3xl font-bold mb-6">Event Categories</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      {% for category in categories %}
      <div
        class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-lg hover:shadow-cyan-500/30 hover:-translate-y-1 transition duration-300"
      >
        <div class="flex items-center justify-between mb-2">
          <h2 class="text-xl font-bold mb-2 text-cyan-300">
            {{ category.name }}
          </h2>
          <div>
            <a
              href="{% url 'update_category' category.id %}"
              class="text-blue-400 hover:text-blue-300 mr-4"
            >
              <i class="fa-solid fa-pen-to-square"></i>
            </a>
            <a
              href="{% url 'delete_category' category.id %}"
              class="text-red-500 hover:text-red-400"
              onclick="
                return confirm(
                  'Are you sure you want to delete this category?',
                );
              "
            >
              <i class="fa-solid fa-trash"></i>
            </a>
          </div>
        </div>
        <p class="text-sm text-slate-400 mb-4">{{ category.description }}</p>
        <a
          href="{% url 'categorycal_events' category.id %}"
          class="text-xs px-4 py-1 rounded-lg bg-cyan-500 text-white font-semibold hover:scale-105 transition"
        >
          View Events
        </a>
      </div>
      {% empty %}
      <p>No categories found.</p>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
